name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API (Laravel) — composer + phpunit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, pdo_pgsql, zip, gd, bcmath, pcntl
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test
        # phpunit.xml sqlite :memory: ishlatadi — tashqi DB servis shart emas.

  pwa-build:
    name: PWA (Vite/React) — npm build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [api-test, pwa-build]
    # Faqat main'ga to'g'ridan-to'g'ri push'da (PR yoki boshqa branch emas)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      # Talab qilinadigan GitHub Secrets:
      #   SSH_HOST      - server IP/domen
      #   SSH_USER      - deploy foydalanuvchisi
      #   SSH_KEY       - private SSH kaliti (server authorized_keys ga public qo'shilgan)
      #   DEPLOY_PATH   - serverdagi bootstrap repo yo'li (server/deploy.conf shu yerda)
      #   SSH_PORT      - ixtiyoriy (default 22)
      # Serverda bir marta bootstrap: repo'ni DEPLOY_PATH ga clone qiling,
      #   `cp server/deploy.conf.example server/deploy.conf` to'ldiring va `bash server/setup.sh` ni ishga tushiring.
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            git pull --ff-only origin main
            bash server/deploy.sh
